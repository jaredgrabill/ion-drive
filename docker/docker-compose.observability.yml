# Ion Drive — Observability Stack (Optional Overlay)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# This adds Grafana, Loki, Prometheus, and Tempo for full observability.
# All pre-configured with Ion Drive dashboards.

services:
  # --- Grafana (Visualization) ---
  grafana:
    image: grafana/grafana:11-alpine
    container_name: ion-drive-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      # - ./grafana/provisioning:/etc/grafana/provisioning  # Pre-built dashboards

  # --- Loki (Logs) ---
  loki:
    image: grafana/loki:3.3-alpine
    container_name: ion-drive-loki
    restart: unless-stopped
    ports:
      - "3101:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki

  # --- Prometheus (Metrics) ---
  prometheus:
    image: prom/prometheus:v3.1-alpine
    container_name: ion-drive-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      # - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  # --- Tempo (Traces) ---
  tempo:
    image: grafana/tempo:2.6-alpine
    container_name: ion-drive-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - tempo-data:/var/tempo

volumes:
  grafana-data:
    driver: local
  loki-data:
    driver: local
  prometheus-data:
    driver: local
  tempo-data:
    driver: local
