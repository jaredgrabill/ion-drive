# Ion Drive — Docker Compose (Development)
#
# Usage:
#   docker compose up -d        # Start services
#   docker compose down         # Stop services
#   docker compose logs -f      # Follow logs

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:17-alpine
    container_name: ion-drive-postgres
    restart: unless-stopped
    ports:
      # Host port is overridable for machines that already run a Postgres on
      # 5432: `ION_PG_PORT=55432 docker compose -f docker/docker-compose.yml up -d`
      # (or put ION_PG_PORT in docker/.env). Keep ION_DATABASE_URL in the repo
      # root .env pointing at the same port.
      - "${ION_PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ion
      POSTGRES_PASSWORD: ion
      POSTGRES_DB: ion_drive
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ion -d ion_drive"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis (optional — for @ion-drive/plugin-redis) ---
  # Uncomment when developing against the Redis cache/bus plugin.
  # redis:
  #   image: redis:7-alpine
  #   container_name: ion-drive-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # --- MinIO (optional — S3-compatible target for @ion-drive/plugin-storage-s3) ---
  # Console at http://localhost:9001 (minioadmin/minioadmin). Create a bucket,
  # then set ION_S3_BUCKET + ION_S3_ENDPOINT=http://localhost:9000.
  # minio:
  #   image: minio/minio
  #   container_name: ion-drive-minio
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - miniodata:/data

  # --- Ion Drive Core (dev mode — use local source) ---
  # Uncomment to run Ion Drive in Docker instead of locally
  # ion-drive:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile
  #   container_name: ion-drive-core
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     ION_DATABASE_URL: postgresql://ion:ion@postgres:5432/ion_drive
  #     NODE_ENV: development
  #     ION_LOG_LEVEL: debug
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  pgdata:
    driver: local
  # miniodata: # uncomment together with the minio service
  #   driver: local
