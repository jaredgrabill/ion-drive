# Ion Drive — release pipeline (Phase 14 Tier 0)
#
# Publishes the fixed-version package group (core, admin, cli, client) to npm
# and the standalone server image to GHCR.
#
# Trigger: push a version tag (`v<version>`, e.g. v0.2.0) after running
# `pnpm changeset version` and committing the bumps — the tag must match the
# package version exactly (guarded below). A manual `workflow_dispatch` run
# performs a full DRY RUN (publish --dry-run, image built but not pushed) so
# the pipeline can be rehearsed without releasing anything.
#
# Required repo secret: NPM_TOKEN (npm automation token with publish rights
# to the @ionshift scope). GHCR uses the built-in GITHUB_TOKEN.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # dry-run rehearsal — nothing is published

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # npm provenance

jobs:
  npm:
    name: Publish npm packages${{ github.event_name == 'workflow_dispatch' && ' (dry run)' || '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard — tag matches the package version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/core/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package version $PKG — run 'pnpm changeset version' and retag."
            exit 1
          fi

      - name: Guard — no pending changesets
        if: github.event_name == 'push'
        run: |
          PENDING="$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)"
          if [ "$PENDING" -ne 0 ]; then
            echo "::error::There are $PENDING unconsumed changeset(s) — run 'pnpm changeset version' before tagging."
            exit 1
          fi

      - name: Guard — CLI must not depend on the retired blocks package
        run: |
          if node -p "require('./packages/cli/package.json').dependencies?.['@ionshift/ion-drive-blocks'] ?? ''" | grep -q .; then
            echo "::error::@ionshift/ion-drive-cli still has a runtime dependency on @ionshift/ion-drive-blocks (unpublished; retired per ADR-018) — installs would break."
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Copy LICENSE and NOTICE into publish packages
        run: |
          for pkg in core admin cli client; do
            cp LICENSE NOTICE "packages/$pkg/"
          done

      - name: Publish to npm
        run: pnpm publish -r --access public --no-git-checks ${{ github.event_name == 'workflow_dispatch' && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

  docker:
    name: Publish Docker image${{ github.event_name == 'workflow_dispatch' && ' (build only)' || '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ion-drive
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=dry-run,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
