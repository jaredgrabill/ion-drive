# Ion Drive — release pipeline (Phase 14 Tier 0)
#
# Publishes the fixed-version package group (core, admin, cli, client) to npm
# and the standalone server image to GHCR.
#
# Trigger: push a version tag (`v<version>`, e.g. v0.2.0) after running
# `pnpm changeset version` and committing the bumps — the tag must match the
# package version exactly (guarded below). A manual `workflow_dispatch` run
# performs a full DRY RUN (publish --dry-run, image built but not pushed) so
# the pipeline can be rehearsed without releasing anything.
#
# Auth: npm **Trusted Publishing** (OIDC) — no NPM_TOKEN secret. Each package
# must have this repo + workflow configured as a trusted publisher on
# npmjs.com (package → Settings → Trusted Publisher → GitHub Actions:
# owner `jaredgrabill`, repo `ion-drive`, workflow `release.yml`). Provenance
# is attached automatically. Versions already on the registry are skipped, so
# re-pushing a tag (or tagging after a manual local publish) stays green.
# GHCR uses the built-in GITHUB_TOKEN.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: # dry-run rehearsal — nothing is published

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # npm provenance

jobs:
  npm:
    name: Publish npm packages${{ github.event_name == 'workflow_dispatch' && ' (dry run)' || '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      # No registry-url: setup-node would write an .npmrc referencing
      # NODE_AUTH_TOKEN, which breaks tokenless OIDC publishing.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard — tag matches the package version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./packages/core/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package version $PKG — run 'pnpm changeset version' and retag."
            exit 1
          fi

      - name: Guard — no pending changesets
        if: github.event_name == 'push'
        run: |
          PENDING="$(find .changeset -name '*.md' ! -name 'README.md' | wc -l)"
          if [ "$PENDING" -ne 0 ]; then
            echo "::error::There are $PENDING unconsumed changeset(s) — run 'pnpm changeset version' before tagging."
            exit 1
          fi

      - name: Guard — CLI must not depend on the retired blocks package
        run: |
          if node -p "require('./packages/cli/package.json').dependencies?.['@ion-drive/blocks'] ?? ''" | grep -q .; then
            echo "::error::@ion-drive/cli still has a runtime dependency on @ion-drive/blocks (unpublished; retired per ADR-018) — installs would break."
            exit 1
          fi

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

      - name: Copy LICENSE and NOTICE into publish packages
        run: |
          for pkg in core admin cli client; do
            cp LICENSE NOTICE "packages/$pkg/"
          done

      # Trusted publishing needs npm >= 11.5.1 (node 22 bundles npm 10).
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1 && npm --version

      # No workspace: protocols exist in published dependency fields, so
      # plain `npm publish` per package is safe (no pnpm rewriting needed).
      - name: Publish to npm (OIDC${{ github.event_name == 'workflow_dispatch' && ', dry run' || '' }})
        run: |
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && '--dry-run' || '' }}"
          for pkg in client admin core cli; do
            NAME="$(node -p "require('./packages/$pkg/package.json').name")"
            VERSION="$(node -p "require('./packages/$pkg/package.json').version")"
            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "::notice::$NAME@$VERSION is already on the registry — skipping"
              continue
            fi
            echo "Publishing $NAME@$VERSION $DRY_RUN"
            (cd "packages/$pkg" && npm publish --access public $DRY_RUN)
          done

  docker:
    name: Publish Docker image${{ github.event_name == 'workflow_dispatch' && ' (build only)' || '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ion-drive
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=dry-run,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
