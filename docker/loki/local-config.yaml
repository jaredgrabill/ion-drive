# Loki single-binary configuration for the Ion Drive observability overlay.
# Minimal filesystem-backed setup for grafana/loki 3.3.x.
#
# Ingestion endpoints (host port 3101 → container 3100):
#   - Loki push API:  POST http://localhost:3101/loki/api/v1/push
#   - Native OTLP:    POST http://localhost:3101/otlp/v1/logs
# Note: Ion Drive's single ION_OTEL_EXPORTER_OTLP_ENDPOINT points at Tempo for
# traces; shipping logs here too requires an OTel Collector fan-out (see
# docs/deployment/docker.md).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-04-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Required for native OTLP log ingestion (attributes → structured metadata).
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
