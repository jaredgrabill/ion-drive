# Ion Drive — Observability Stack (Optional Overlay)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# This adds Grafana, Loki, Prometheus, and Tempo, pre-configured for Ion Drive:
#   - Grafana (http://localhost:3100, admin/admin) is provisioned with
#     Prometheus/Loki/Tempo datasources and the "Ion Drive Overview" dashboard.
#   - Prometheus scrapes the Ion Drive server's /metrics endpoint (assumed to
#     run on the host at port 3000 — see prometheus/prometheus.yml to change).
#   - Tempo receives OTLP traces: set ION_OTEL_ENABLED=true and
#     ION_OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 on the server.
# See docs/deployment/docker.md for the full walkthrough.

services:
  # --- Grafana (Visualization) ---
  grafana:
    image: grafana/grafana:11.4.0
    container_name: ion-drive-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

  # --- Loki (Logs) ---
  loki:
    image: grafana/loki:3.3.2
    container_name: ion-drive-loki
    restart: unless-stopped
    ports:
      - "3101:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
      - ./loki/local-config.yaml:/etc/loki/local-config.yaml:ro

  # --- Prometheus (Metrics) ---
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: ion-drive-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    # Lets the container reach the Ion Drive server running on the host
    # (automatic on Docker Desktop; this makes it work on Linux too).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # --- Tempo (Traces) ---
  tempo:
    image: grafana/tempo:2.6.1
    container_name: ion-drive-tempo
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - tempo-data:/var/tempo
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro

volumes:
  grafana-data:
    driver: local
  loki-data:
    driver: local
  prometheus-data:
    driver: local
  tempo-data:
    driver: local
