# Ion Drive — CI pipeline
#
# Runs on every push to main and on pull requests:
#   - checks:      lint (Biome), typecheck, unit tests, build across the monorepo
#   - integration: core integration tests against a real Postgres 17 service

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  integration:
    name: Integration tests (Postgres 17)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ion
          POSTGRES_PASSWORD: ion
          POSTGRES_DB: ion_drive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ion -d ion_drive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: pnpm --filter @ion-drive/core test:integration
        env:
          ION_DATABASE_URL: postgresql://ion:ion@localhost:5432/ion_drive
